<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ccfbf1;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="430" cy="80" r="90" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="430" r="120" fill="rgba(255,255,255,0.04)"/>
  <!-- Medical cross -->
  <rect x="196" y="96" width="120" height="320" rx="40" fill="url(#cross)" opacity="0.95"/>
  <rect x="96" y="196" width="320" height="120" rx="40" fill="url(#cross)" opacity="0.95"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="52" fill="#0d9488" opacity="0.85"/>
  <!-- v3 text -->
  <text x="256" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="42" fill="white" letter-spacing="1">v3</text>
</svg>